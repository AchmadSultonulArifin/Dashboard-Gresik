name: Scraping Gresik Otomatis

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install library
        run: |
          pip install twscrape pandas
          pip install Sastrawi
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers

      - name: Jalankan scraping
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          CT0: ${{ secrets.CT0 }}
          AUTH_TOKEN_2: ${{ secrets.AUTH_TOKEN_2 }}
          CT0_2: ${{ secrets.CT0_2 }}
        run: python scrape.py

      - name: Push hasil ke repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add output/
          git commit -m "data: update Gresik $(date +'%Y-%m-%d')" || echo "no changes"
          git push

  scrape-googlemaps:
    runs-on: ubuntu-latest
    needs: scrape-twitter       # tunggu Twitter selesai dulu baru jalan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install library
        run: |
          pip install apify-client python-dotenv pandas
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers
      - name: Jalankan scraping Google Maps
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python googlemaps.py
      - name: Push hasil ke repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add output/
          git commit -m "data: update Google Maps Gresik $(date +'%Y-%m-%d')" || echo "no changes"
          git push